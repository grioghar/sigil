name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Hosted runners ship a Rust toolchain; the differential tests need it.
      - name: Show toolchain versions
        run: |
          python --version
          rustc --version
      - name: Run test suite (interpreter + native differential)
        run: python -m unittest discover -s tests -v
