name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Hosted runners ship a Rust toolchain; the differential tests need it.
      - name: Show toolchain versions
        run: |
          python --version
          rustc --version
      - name: Install verifier (Z3)
        run: python -m pip install z3-solver
      - name: Run test suite (interpreter + native differential)
        run: python -m unittest discover -s tests -v
      - name: Examples must be canonical (sigil fmt --check)
        shell: bash
        run: |
          for f in examples/*.sg; do
            python -m sigil fmt --check "$f"
          done
